<!DOCTYPE html>
<html lang="en">
 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="LoginStyle.css">
<script>
        async function handleLogin(event) {
            event.preventDefault();
 
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
 
            try {
                const response = await fetch("http://localhost:8080/api/users/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                    },
                    body: new URLSearchParams({ username, password }),
                });
 
                if (response.ok) {
                    alert("Login successful!");
                    window.location.href = "BudgifyMainPage.html";
                } else {
                    const errorMessage = await response.text();
                    alert("Error: " + errorMessage);
                }
            } catch (error) {
                console.error("Error during login:", error);
                alert("An error occurred. Please try again later.");
            }
        }
</script>
</head>
 
<body>
<header>
<div class="logo">
<a href="#"><img src="images/Spotify logo.png" alt="Spotify Logo"></a>
</div>
</header>
 
    <section>
<div class="main">
<h1>Log in to Budgify</h1>
<hr>
<form onsubmit="handleLogin(event)">
<input id="username" type="text" placeholder="Email or username" required>
<input id="password" type="password" placeholder="Password" required>
<div class="switch">
<input type="checkbox" id="remember-me" checked>
<label for="remember-me"></label>
<span>Remember me</span>
</div>
<button class="log-in" type="submit">Log In</button>
<a href="#">Forgot your password?</a>
</form>
<hr>
<div class="last">
<span>Don't have an account?</span>
<a href="Signup.html">Sign up for Spotify</a>
</div>
</div>
</section>
</body>
 
</html>
